target-version = "py312"
line-length = 120
indent-width = 4
extend-exclude = [".vscode", ".idea", "__pycache__", ".python-version", ".ruff.toml", "ruff.toml", "setup.cfg", "pyproject.toml"]

[format]
indent-style = "space"
line-ending = "lf"
docstring-code-format = true
docstring-code-line-length = 120